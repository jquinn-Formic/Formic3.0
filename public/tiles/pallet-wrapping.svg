<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-pw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1517"/>
      <stop offset="1" stop-color="#14272b"/>
    </linearGradient>
    <pattern id="grid-pw" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="rgba(255,145,0,.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="600" height="600" fill="url(#bg-pw)"/>
  <rect width="600" height="600" fill="url(#grid-pw)"/>
  <g stroke="rgba(255,145,0,.55)" stroke-width="1.5" fill="none">
    <path d="M24 44 V24 H44"/>
    <path d="M576 44 V24 H556"/>
    <path d="M24 556 V576 H44"/>
    <path d="M576 556 V576 H556"/>
  </g>
  <text x="48" y="56" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="rgba(255,145,0,.85)" letter-spacing="2">FPO · 04</text>
  <text x="552" y="56" text-anchor="end" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="rgba(240,245,241,.5)" letter-spacing="2">PALLET WRAPPING</text>
  <!-- pallet base -->
  <g stroke="rgba(255,145,0,.85)" stroke-width="2.4" fill="none">
    <rect x="160" y="475" width="280" height="22"/>
    <line x1="200" y1="497" x2="200" y2="517"/>
    <line x1="300" y1="497" x2="300" y2="517"/>
    <line x1="400" y1="497" x2="400" y2="517"/>
    <line x1="160" y1="517" x2="440" y2="517"/>
  </g>
  <!-- product stack outline (faint) -->
  <g stroke="rgba(240,245,241,.25)" stroke-width="1.6" fill="none" stroke-dasharray="3 3">
    <rect x="200" y="200" width="200" height="270"/>
  </g>
  <!-- spiral wrap (perspective ellipses) -->
  <g stroke="rgba(255,145,0,.85)" stroke-width="2" fill="none">
    <ellipse cx="300" cy="220" rx="100" ry="14"/>
    <ellipse cx="300" cy="265" rx="100" ry="14"/>
    <ellipse cx="300" cy="310" rx="100" ry="14"/>
    <ellipse cx="300" cy="355" rx="100" ry="14"/>
    <ellipse cx="300" cy="400" rx="100" ry="14"/>
    <ellipse cx="300" cy="445" rx="100" ry="14"/>
  </g>
  <!-- rotation arrow -->
  <g stroke="rgba(255,145,0,.65)" stroke-width="1.6" fill="none">
    <path d="M120 120 A50 50 0 0 1 180 100"/>
    <path d="M180 100 L172 92 M180 100 L172 110"/>
  </g>
  <!-- film roll -->
  <g stroke="rgba(255,145,0,.85)" stroke-width="2.2" fill="none">
    <rect x="445" y="290" width="32" height="80"/>
    <line x1="445" y1="310" x2="477" y2="310"/>
    <line x1="445" y1="350" x2="477" y2="350"/>
    <!-- film extending to product -->
    <line x1="445" y1="330" x2="402" y2="330" stroke-dasharray="3 3"/>
  </g>
  <text x="48" y="556" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="rgba(240,245,241,.4)" letter-spacing="2">DOCK-READY · TIGHT WRAPS · 100% AUTOMATED</text>
</svg>
