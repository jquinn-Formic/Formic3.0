<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg-hu" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1517"/>
      <stop offset="1" stop-color="#14272b"/>
    </linearGradient>
    <pattern id="grid-hu" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="rgba(255,145,0,.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="600" height="600" fill="url(#bg-hu)"/>
  <rect width="600" height="600" fill="url(#grid-hu)"/>
  <g stroke="rgba(255,145,0,.55)" stroke-width="1.5" fill="none">
    <path d="M24 44 V24 H44"/>
    <path d="M576 44 V24 H556"/>
    <path d="M24 556 V576 H44"/>
    <path d="M576 556 V576 H556"/>
  </g>
  <text x="48" y="56" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="rgba(255,145,0,.85)" letter-spacing="2">FPO · 05</text>
  <text x="552" y="56" text-anchor="end" font-family="ui-monospace, Menlo, monospace" font-size="11" fill="rgba(240,245,241,.5)" letter-spacing="2">HUMANOIDS</text>
  <!-- ground line -->
  <line x1="120" y1="540" x2="480" y2="540" stroke="rgba(240,245,241,.18)" stroke-width="1.4" stroke-dasharray="4 6"/>
  <!-- humanoid silhouette: head, torso, arms, legs -->
  <g stroke="rgba(255,145,0,.85)" stroke-width="2.4" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <!-- head -->
    <rect x="278" y="130" width="44" height="56" rx="6"/>
    <line x1="288" y1="148" x2="312" y2="148"/>
    <!-- neck -->
    <line x1="300" y1="186" x2="300" y2="198"/>
    <!-- shoulders -->
    <line x1="248" y1="210" x2="352" y2="210"/>
    <circle cx="248" cy="210" r="7"/>
    <circle cx="352" cy="210" r="7"/>
    <!-- torso -->
    <path d="M260 218 L260 350 L340 350 L340 218 Z"/>
    <line x1="300" y1="218" x2="300" y2="350"/>
    <!-- chest plate accent -->
    <rect x="278" y="240" width="44" height="60"/>
    <!-- arm left -->
    <line x1="248" y1="218" x2="226" y2="290"/>
    <circle cx="226" cy="296" r="7"/>
    <line x1="226" y1="302" x2="240" y2="380"/>
    <!-- arm right (slightly raised) -->
    <line x1="352" y1="218" x2="380" y2="280"/>
    <circle cx="380" cy="286" r="7"/>
    <line x1="380" y1="292" x2="396" y2="350"/>
    <!-- hips -->
    <line x1="270" y1="350" x2="330" y2="350"/>
    <circle cx="278" cy="358" r="6"/>
    <circle cx="322" cy="358" r="6"/>
    <!-- legs -->
    <line x1="278" y1="364" x2="272" y2="450"/>
    <circle cx="272" cy="456" r="6"/>
    <line x1="272" y1="462" x2="266" y2="540"/>
    <line x1="322" y1="364" x2="328" y2="450"/>
    <circle cx="328" cy="456" r="6"/>
    <line x1="328" y1="462" x2="334" y2="540"/>
    <!-- feet -->
    <line x1="248" y1="540" x2="284" y2="540"/>
    <line x1="316" y1="540" x2="352" y2="540"/>
  </g>
  <!-- joint annotation lines -->
  <g stroke="rgba(255,145,0,.45)" stroke-width="1" fill="none" stroke-dasharray="2 3">
    <line x1="226" y1="296" x2="160" y2="296"/>
    <line x1="380" y1="286" x2="450" y2="286"/>
  </g>
  <text x="148" y="290" text-anchor="end" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="rgba(255,145,0,.6)" letter-spacing="1">J_03</text>
  <text x="456" y="290" font-family="ui-monospace, Menlo, monospace" font-size="9" fill="rgba(255,145,0,.6)" letter-spacing="1">J_07</text>
  <text x="48" y="556" font-family="ui-monospace, Menlo, monospace" font-size="10" fill="rgba(240,245,241,.4)" letter-spacing="2">GENERALIST · DEPLOYED-AS-A-SERVICE</text>
</svg>
